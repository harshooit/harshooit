<svg width="1200" height="30" viewBox="0 0 1200 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CC9F0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7209B7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4CC9F0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .dot { animation: dotPulse 2.6s ease-in-out infinite; transform-origin: 600px 15px; }
    @keyframes dotPulse { 0%,100%{ transform: scale(1); opacity:0.6; } 50%{ transform: scale(1.6); opacity:1; } }
  </style>
  <rect x="0" y="14" width="1200" height="2" fill="url(#lineGrad)"/>
  <circle class="dot" cx="600" cy="15" r="3.5" fill="#4CC9F0"/>
</svg>
