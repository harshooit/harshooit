<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="50%" stop-color="#3A0CA3"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </linearGradient>
    <linearGradient id="fwaveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7209B7" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="fDotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fTextGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .f1 { animation: fA 10s linear infinite; }
    .f2 { animation: fB 16s linear infinite reverse; }
    @keyframes fA { from{transform:translateX(0);} to{transform:translateX(-1200px);} }
    @keyframes fB { from{transform:translateX(0);} to{transform:translateX(-1200px);} }

    .fspark { animation: ftw 3.4s ease-in-out infinite; }
    @keyframes ftw { 0%,100%{opacity:0.12;} 50%{opacity:0.85;} }

    .ftext { animation: ffade 1.5s ease-out both; }
    @keyframes ffade { from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }

    .heart { animation: fpulse 1.6s ease-in-out infinite; transform-origin: center; }
    @keyframes fpulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.25);} }

    .ftrace { stroke:#FFFFFF; stroke-opacity:0.18; }
    .fnode { fill:#FFFFFF; fill-opacity:0.25; }
  </style>

  <rect width="1200" height="120" fill="url(#fgGrad)"/>

  <g class="ftrace" fill="none" stroke-width="1.4">
    <path id="fSignalPath" d="M40,15 H100 V35 H180"/>
  </g>
  <circle class="fnode" cx="100" cy="15" r="2.6"/>
  <circle class="fnode" cx="100" cy="35" r="2.6"/>
  <circle class="fnode" cx="180" cy="35" r="2.6"/>

  <circle r="2.8" fill="#4CC9F0" filter="url(#fDotGlow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M40,15 H100 V35 H180"/>
  </circle>

  <circle class="fspark" cx="220" cy="60" r="1.6" fill="#FFFFFF" style="animation-delay:0.2s"/>
  <circle class="fspark" cx="560" cy="25" r="1.4" fill="#F72585" style="animation-delay:1.1s"/>
  <circle class="fspark" cx="900" cy="55" r="1.8" fill="#4CC9F0" style="animation-delay:0.6s"/>
  <circle class="fspark" cx="1080" cy="20" r="1.5" fill="#FFFFFF" style="animation-delay:1.7s"/>

  <g class="f1">
    <path d="M0,30 C75,10 150,50 225,30 C300,10 375,50 450,30 C525,10 600,50 675,30 C750,10 825,50 900,30 C975,10 1050,50 1125,30 C1200,10 1200,30 1200,30 L1200,0 L0,0 Z" fill="url(#fwaveGrad)"/>
    <path d="M1200,30 C1275,10 1350,50 1425,30 C1500,10 1575,50 1650,30 C1725,10 1800,50 1875,30 C1950,10 2025,50 2100,30 C2175,10 2250,50 2325,30 C2400,10 2400,30 2400,30 L2400,0 L1200,0 Z" fill="url(#fwaveGrad)"/>
  </g>
  <g class="f2">
    <path d="M0,18 C100,33 200,3 300,18 C400,33 500,3 600,18 C700,33 800,3 900,18 C1000,33 1100,3 1200,18 L1200,0 L0,0 Z" fill="#FFFFFF" opacity="0.10"/>
    <path d="M1200,18 C1300,33 1400,3 1500,18 C1600,33 1700,3 1800,18 C1900,33 2000,3 2100,18 C2200,33 2300,3 2400,18 L2400,0 L1200,0 Z" fill="#FFFFFF" opacity="0.10"/>
  </g>

  <text x="600" y="95" filter="url(#fTextGlow)" font-family="Segoe UI, Verdana, sans-serif" font-size="16" fill="#4CC9F0" text-anchor="middle" opacity="0.5">Thanks for stopping by</text>
  <text x="600" y="95" class="ftext" font-family="Segoe UI, Verdana, sans-serif" font-size="16" fill="#E8E9F3" text-anchor="middle">Thanks for stopping by</text>
  <text class="heart" x="710" y="95" font-size="14" fill="#F72585" text-anchor="middle">&#10084;</text>
</svg>
