<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="50%" stop-color="#3A0CA3"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7209B7" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <style>
    .bgrect { fill: url(#bgGrad); }
    .wave-group-1 { animation: waveScroll1 9s linear infinite; }
    .wave-group-2 { animation: waveScroll2 14s linear infinite; }
    @keyframes waveScroll1 {
      from { transform: translateX(0); }
      to   { transform: translateX(-1200px); }
    }
    @keyframes waveScroll2 {
      from { transform: translateX(0); }
      to   { transform: translateX(-1200px); }
    }
    .title { animation: fadeUp 1.4s ease-out; }
    .subtitle { animation: fadeUp 1.4s ease-out 0.3s both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.9; }
    }
  </style>

  <rect class="bgrect" width="1200" height="220"/>

  <!-- twinkling sparkles -->
  <circle class="spark" cx="120" cy="45" r="2" fill="#4CC9F0" style="animation-delay:0s"/>
  <circle class="spark" cx="260" cy="30" r="1.6" fill="#F72585" style="animation-delay:0.6s"/>
  <circle class="spark" cx="430" cy="55" r="2" fill="#FFFFFF" style="animation-delay:1.1s"/>
  <circle class="spark" cx="760" cy="35" r="1.8" fill="#4CC9F0" style="animation-delay:0.4s"/>
  <circle class="spark" cx="920" cy="50" r="2.2" fill="#F72585" style="animation-delay:1.6s"/>
  <circle class="spark" cx="1080" cy="30" r="1.5" fill="#FFFFFF" style="animation-delay:0.9s"/>

  <!-- scrolling wave layer (back) -->
  <g class="wave-group-1">
    <path d="M0,170 C75,150 150,190 225,170 C300,150 375,190 450,170 C525,150 600,190 675,170 C750,150 825,190 900,170 C975,150 1050,190 1125,170 C1200,150 1200,170 1200,170 L1200,220 L0,220 Z" fill="url(#waveGrad1)"/>
    <path d="M1200,170 C1275,150 1350,190 1425,170 C1500,150 1575,190 1650,170 C1725,150 1800,190 1875,170 C1950,150 2025,190 2100,170 C2175,150 2250,190 2325,170 C2400,150 2400,170 2400,170 L2400,220 L1200,220 Z" fill="url(#waveGrad1)"/>
  </g>

  <!-- scrolling wave layer (front, offset) -->
  <g class="wave-group-2">
    <path d="M0,190 C100,205 200,175 300,190 C400,205 500,175 600,190 C700,205 800,175 900,190 C1000,205 1100,175 1200,190 L1200,220 L0,220 Z" fill="#000000" opacity="0.25"/>
    <path d="M1200,190 C1300,205 1400,175 1500,190 C1600,205 1700,175 1800,190 C1900,205 2000,175 2100,190 C2200,205 2300,175 2400,190 L2400,220 L1200,220 Z" fill="#000000" opacity="0.25"/>
  </g>

  <text x="600" y="100" class="title" font-family="Segoe UI, Verdana, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">Harshit Prabhakar Jadhav</text>
  <text x="600" y="140" class="subtitle" font-family="Segoe UI, Verdana, sans-serif" font-size="20" fill="#D6D9F5" text-anchor="middle">Electronics &amp; Communication Engineering Student</text>
</svg>
