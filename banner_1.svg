<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="45%" stop-color="#3A0CA3"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CC9F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4CC9F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7209B7" stop-opacity="0.30"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .wave-1 { animation: scrollA 9s linear infinite; }
    .wave-2 { animation: scrollB 15s linear infinite; }
    @keyframes scrollA { from{transform:translateX(0);} to{transform:translateX(-1200px);} }
    @keyframes scrollB { from{transform:translateX(0);} to{transform:translateX(-1200px);} }

    .title { animation: fadeUp 1.3s ease-out both; }
    .subtitle { animation: fadeUp 1.3s ease-out 0.35s both; }
    @keyframes fadeUp { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }

    .pulseGlow { animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:0.35; transform:scale(1);} 50%{opacity:0.75; transform:scale(1.08);} }

    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.95;} }

    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

    .trace { stroke: #4CC9F0; stroke-opacity:0.18; }
    .node { fill: #4CC9F0; fill-opacity:0.25; }
  </style>

  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- circuit trace motif, top-left -->
  <g class="trace" fill="none" stroke-width="1.5">
    <path d="M0,20 H60 V45 H140 V20 H220"/>
    <path d="M0,60 H30 V90 H100"/>
  </g>
  <circle class="node" cx="60" cy="20" r="3"/>
  <circle class="node" cx="60" cy="45" r="3"/>
  <circle class="node" cx="140" cy="45" r="3"/>
  <circle class="node" cx="140" cy="20" r="3"/>
  <circle class="node" cx="30" cy="60" r="3"/>
  <circle class="node" cx="30" cy="90" r="3"/>

  <!-- circuit trace motif, bottom-right -->
  <g class="trace" fill="none" stroke-width="1.5">
    <path id="signalPath" d="M1200,190 H1140 V165 H1060 V190 H980"/>
    <path d="M1200,150 H1170 V120 H1100"/>
  </g>
  <circle class="node" cx="1140" cy="190" r="3"/>
  <circle class="node" cx="1140" cy="165" r="3"/>
  <circle class="node" cx="1060" cy="165" r="3"/>
  <circle class="node" cx="1060" cy="190" r="3"/>
  <circle class="node" cx="1170" cy="150" r="3"/>
  <circle class="node" cx="1170" cy="120" r="3"/>

  <!-- traveling signal pulse along the circuit trace -->
  <circle r="3.2" fill="#4CC9F0" filter="url(#dotGlow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M1200,190 H1140 V165 H1060 V190 H980"/>
  </circle>

  <!-- soft glow behind title -->
  <ellipse class="pulseGlow" cx="600" cy="95" rx="260" ry="70" fill="url(#glowGrad)"/>

  <!-- scrolling parallax waves -->
  <g class="wave-1">
    <path d="M0,175 C75,155 150,195 225,175 C300,155 375,195 450,175 C525,155 600,195 675,175 C750,155 825,195 900,175 C975,155 1050,195 1125,175 C1200,155 1200,175 1200,175 L1200,220 L0,220 Z" fill="url(#waveGrad1)"/>
    <path d="M1200,175 C1275,155 1350,195 1425,175 C1500,155 1575,195 1650,175 C1725,155 1800,195 1875,175 C1950,155 2025,195 2100,175 C2175,155 2250,195 2325,175 C2400,155 2400,175 2400,175 L2400,220 L1200,220 Z" fill="url(#waveGrad1)"/>
  </g>
  <g class="wave-2">
    <path d="M0,195 C100,210 200,180 300,195 C400,210 500,180 600,195 C700,210 800,180 900,195 C1000,210 1100,180 1200,195 L1200,220 L0,220 Z" fill="#000000" opacity="0.28"/>
    <path d="M1200,195 C1300,210 1400,180 1500,195 C1600,210 1700,180 1800,195 C1900,210 2000,180 2100,195 C2200,210 2300,180 2400,195 L2400,220 L1200,220 Z" fill="#000000" opacity="0.28"/>
  </g>

  <!-- sparkles -->
  <circle class="spark" cx="90" cy="140" r="1.8" fill="#FFFFFF" style="animation-delay:0s"/>
  <circle class="spark" cx="250" cy="165" r="1.5" fill="#F72585" style="animation-delay:0.5s"/>
  <circle class="spark" cx="330" cy="50" r="2" fill="#4CC9F0" style="animation-delay:1s"/>
  <circle class="spark" cx="870" cy="55" r="1.6" fill="#FFFFFF" style="animation-delay:0.3s"/>
  <circle class="spark" cx="950" cy="150" r="2.1" fill="#F72585" style="animation-delay:1.4s"/>
  <circle class="spark" cx="1050" cy="70" r="1.5" fill="#4CC9F0" style="animation-delay:0.8s"/>
  <circle class="spark" cx="150" cy="35" r="1.4" fill="#FFFFFF" style="animation-delay:1.7s"/>
  <circle class="spark" cx="1120" cy="45" r="1.7" fill="#F72585" style="animation-delay:2.1s"/>

  <!-- glow layer behind title text -->
  <text x="600" y="100" filter="url(#softGlow)" font-family="Segoe UI, Verdana, sans-serif" font-size="42" font-weight="700" fill="#4CC9F0" text-anchor="middle" opacity="0.55">Harshit Prabhakar Jadhav</text>

  <!-- crisp title text -->
  <text x="600" y="100" class="title" font-family="Segoe UI, Verdana, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">Harshit Prabhakar Jadhav</text>

  <text x="600" y="140" class="subtitle" font-family="Segoe UI, Verdana, sans-serif" font-size="19" fill="#D6D9F5" text-anchor="middle">Electronics &amp; Communication Engineering Student<tspan class="cursor" fill="#4CC9F0"> _</tspan></text>
</svg>
